# CryptoApp nginx config
# Setup:
#   sudo cp ~/CryptoApp/deploy/nginx-cryptoapp.conf /etc/nginx/sites-available/cryptoapp
#   sudo ln -s /etc/nginx/sites-available/cryptoapp /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl restart nginx

# Redirect HTTP → HTTPS (uncomment when SSL cert is configured)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    # When SSL is configured, change to:
    #   listen 443 ssl;
    #   ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    #   ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    server_name _;

    client_max_body_size 10m;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none';" always;
    # Uncomment when HTTPS is active:
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Serve static files directly (skip gunicorn)
    location /static/ {
        alias /home/pi/CryptoApp/src/web/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Agent analysis can take 60-120s
        proxy_read_timeout 180;
        proxy_connect_timeout 10;
    }
}
