<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Monitor - CryptoApp</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .monitor-card {
            background: var(--card-bg, rgba(255,255,255,0.05));
            border: 1px solid var(--border, rgba(255,255,255,0.1));
            border-radius: 12px;
            padding: 20px;
        }
        .monitor-card h3 {
            color: var(--text-primary, #fff);
            margin: 0 0 15px 0;
            font-size: 16px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-size: 14px;
        }
        .stat-label { color: var(--text-secondary, #aaa); }
        .stat-value { color: var(--text-primary, #fff); font-weight: 600; }
        .stat-value.good { color: #4caf50; }
        .stat-value.warn { color: #ff9800; }
        .stat-value.bad { color: #f44336; }
        .alert-item {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .alert-item.resolved {
            background: rgba(76, 175, 80, 0.1);
            border-color: rgba(76, 175, 80, 0.3);
        }
        .alert-type { font-weight: 600; color: #f44336; font-size: 13px; }
        .alert-item.resolved .alert-type { color: #4caf50; }
        .alert-msg { color: var(--text-secondary, #aaa); font-size: 13px; margin-top: 4px; }
        .alert-time { color: var(--text-secondary, #888); font-size: 12px; margin-top: 4px; }
        .exchange-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            margin-right: 6px;
        }
        .exchange-badge.connected { background: rgba(76,175,80,0.2); color: #4caf50; }
        .exchange-badge.disconnected { background: rgba(244,67,54,0.2); color: #f44336; }
        .back-link {
            color: var(--accent-primary, #667eea);
            text-decoration: none;
            font-size: 14px;
        }
        .refresh-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .no-data { color: var(--text-secondary, #888); font-style: italic; font-size: 14px; }
        .symbol-stats {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
        }
        .symbol-stat {
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            padding: 8px;
            text-align: center;
        }
        .symbol-stat .sym { font-weight: 600; font-size: 13px; color: var(--text-primary, #fff); }
        .symbol-stat .count { font-size: 12px; color: var(--text-secondary, #aaa); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-row">
                <div>
                    <a href="/" class="back-link">&larr; Dashboard</a> &nbsp;|&nbsp;
                    <a href="/trades" class="back-link">Trades</a>
                </div>
                <button class="refresh-btn" onclick="refreshAll()">Refresh</button>
            </div>
            <h1>System Monitor</h1>
            <p>ML predictions &bull; Exchange status &bull; Retraining &bull; Cache &bull; Alerts</p>
        </div>

        <!-- Top KPIs -->
        <div class="monitor-grid" id="kpiGrid">
            <div class="monitor-card" id="mlStatsCard">
                <h3>ML Predictions</h3>
                <div id="mlStatsContent"><div class="no-data">Loading...</div></div>
            </div>
            <div class="monitor-card" id="exchangeCard">
                <h3>Exchanges</h3>
                <div id="exchangeContent"><div class="no-data">Loading...</div></div>
            </div>
            <div class="monitor-card" id="retrainCard">
                <h3>ML Retraining</h3>
                <div id="retrainContent"><div class="no-data">Loading...</div></div>
            </div>
            <div class="monitor-card" id="cacheCard">
                <h3>Redis Cache</h3>
                <div id="cacheContent"><div class="no-data">Loading...</div></div>
            </div>
        </div>

        <!-- Alerts -->
        <div class="monitor-card" style="margin-bottom:20px;">
            <h3>Active Alerts</h3>
            <div id="alertsContent"><div class="no-data">Loading...</div></div>
        </div>

        <!-- Per-symbol breakdown -->
        <div class="monitor-card">
            <h3>Per-Symbol Predictions</h3>
            <div id="symbolContent"><div class="no-data">Loading...</div></div>
        </div>
    </div>

    <script>
        const API = '';

        async function fetchJSON(url) {
            try {
                const r = await fetch(API + url);
                return await r.json();
            } catch (e) {
                return { success: false, error: e.message };
            }
        }

        function statRow(label, value, cls) {
            return `<div class="stat-row"><span class="stat-label">${label}</span><span class="stat-value ${cls || ''}">${value}</span></div>`;
        }

        async function loadMLStats() {
            const data = await fetchJSON('/api/monitoring/stats');
            const el = document.getElementById('mlStatsContent');
            if (!data.success) { el.innerHTML = `<div class="no-data">Unavailable</div>`; return; }
            const s = data.stats || {};
            const errClass = (s.error_rate || 0) > 0.25 ? 'bad' : (s.error_rate || 0) > 0.1 ? 'warn' : 'good';
            el.innerHTML = [
                statRow('Total predictions', s.total_predictions || 0),
                statRow('Errors', s.error_count || 0, errClass),
                statRow('Error rate', ((s.error_rate || 0) * 100).toFixed(1) + '%', errClass),
                statRow('Cache hit rate', ((s.cache_hit_rate || 0) * 100).toFixed(1) + '%'),
                statRow('Avg response', (s.avg_response_ms || 0).toFixed(0) + 'ms'),
                statRow('Symbols tracked', Object.keys(s.per_symbol || {}).length),
            ].join('');

            // Per-symbol
            const syms = s.per_symbol || {};
            const symEl = document.getElementById('symbolContent');
            if (Object.keys(syms).length === 0) {
                symEl.innerHTML = '<div class="no-data">No symbol data yet</div>';
            } else {
                symEl.innerHTML = '<div class="symbol-stats">' +
                    Object.entries(syms).map(([sym, d]) =>
                        `<div class="symbol-stat"><div class="sym">${sym}</div><div class="count">${d.count || 0} predictions</div></div>`
                    ).join('') + '</div>';
            }
        }

        async function loadExchanges() {
            const data = await fetchJSON('/api/exchanges/status');
            const el = document.getElementById('exchangeContent');
            if (!data.success) { el.innerHTML = `<div class="no-data">Unavailable</div>`; return; }
            const exs = data.exchanges || {};
            let html = '';
            for (const [eid, info] of Object.entries(exs)) {
                const cls = info.connected ? 'connected' : (info.configured ? 'disconnected' : 'disconnected');
                const label = info.connected ? 'Connected' : (info.configured ? 'Configured' : 'Not configured');
                html += `<div style="margin-bottom:10px;">
                    <span class="exchange-badge ${cls}">${eid.toUpperCase()}</span>
                    <span style="font-size:13px;color:var(--text-secondary)">${label} &bull; ${info.pairs || 0} pairs</span>
                </div>`;
            }
            html += statRow('Priority', (data.priority || []).join(' → '));
            html += statRow('Total coins', data.total_coins || 0);
            el.innerHTML = html;
        }

        async function loadRetrain() {
            const data = await fetchJSON('/api/retrain/status');
            const el = document.getElementById('retrainContent');
            if (!data.success) { el.innerHTML = `<div class="no-data">Unavailable</div>`; return; }
            const running = data.running ? 'Running' : 'Stopped';
            const rClass = data.running ? 'good' : 'warn';
            let html = statRow('Scheduler', running, rClass);
            if (data.last_retrain) {
                html += statRow('Last retrain', new Date(data.last_retrain).toLocaleString());
                if (data.last_retrain_status) {
                    const ok = data.last_retrain_status.success;
                    html += statRow('Status', ok ? 'Success' : 'Failed', ok ? 'good' : 'bad');
                }
            } else {
                html += statRow('Last retrain', 'Never');
            }
            if (data.scheduled_jobs) {
                html += statRow('Jobs scheduled', data.scheduled_jobs.length);
            }
            el.innerHTML = html;
        }

        async function loadCache() {
            const data = await fetchJSON('/api/cache/status');
            const el = document.getElementById('cacheContent');
            if (!data.success && !data.available) {
                const configured = data.url_configured ? 'URL configured but not connected' : 'Not configured';
                el.innerHTML = statRow('Redis', configured, 'warn');
                return;
            }
            if (data.available) {
                el.innerHTML = [
                    statRow('Status', 'Connected', 'good'),
                    statRow('Keys', data.total_keys || 0),
                    statRow('Memory', data.memory_used || 'N/A'),
                    statRow('Clients', data.connected_clients || 0),
                ].join('');
            } else {
                el.innerHTML = statRow('Redis', 'Not available', 'warn');
            }
        }

        async function loadAlerts() {
            const data = await fetchJSON('/api/monitoring/alerts');
            const el = document.getElementById('alertsContent');
            if (!data.success) { el.innerHTML = '<div class="no-data">Unavailable</div>'; return; }
            const alerts = data.alerts || {};
            const keys = Object.keys(alerts);
            if (keys.length === 0) {
                el.innerHTML = '<div class="no-data">No active alerts</div>';
                return;
            }
            el.innerHTML = keys.map(k => {
                const a = alerts[k];
                const resolved = a.resolved;
                return `<div class="alert-item ${resolved ? 'resolved' : ''}">
                    <div class="alert-type">${resolved ? '✓' : '⚠'} ${a.type || k}</div>
                    <div class="alert-msg">${a.message || ''}</div>
                    <div class="alert-time">${a.timestamp || ''}</div>
                </div>`;
            }).join('');
        }

        async function refreshAll() {
            await Promise.all([loadMLStats(), loadExchanges(), loadRetrain(), loadCache(), loadAlerts()]);
        }

        refreshAll();
        setInterval(refreshAll, 30000);
    </script>
</body>
</html>
